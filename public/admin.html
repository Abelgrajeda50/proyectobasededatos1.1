<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - Villa Becerra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .admin-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 2rem; }
        #panelControl { display: none; }
        .btn-confirmar { background-color: #28a745; color: white; border: none; }
    </style>
</head>
<body class="p-4">

    <div id="loginSection" class="container mt-5" style="max-width: 400px;">
        <div class="admin-card text-center">
            <h3 class="mb-4 text-success">Acceso Admin</h3>
            <form id="formLogin">
                <input type="text" id="userInput" class="form-control mb-3" placeholder="Usuario" required>
                <input type="password" id="passInput" class="form-control mb-4" placeholder="Contraseña" required>
                <button type="submit" class="btn btn-success w-100 py-2">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="panelControl" class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="txtBienvenida" class="fw-bold">Panel de Gestión</h2>
            <div class="d-flex gap-3">
                <select id="selTabla" class="form-select w-auto fw-bold" onchange="cargarTabla()">
                    <option value="reservas">📅 Reservas</option>
                    <option value="clientes">👥 Clientes</option>
                    <option value="pagos">💰 Pagos</option>
                    <option value="usuarios">🔑 Usuarios</option>
                </select>
                <button class="btn btn-outline-danger" onclick="location.reload()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="admin-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead id="headTab" class="table-success text-uppercase small"></thead>
                    <tbody id="bodyTab"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: u, password: p })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('panelControl').style.display = 'block';
                    document.getElementById('txtBienvenida').innerText = `Hola, ${data.user}`;
                    cargarTabla();
                } else {
                    alert(data.mensaje || "Error de credenciales");
                }
            } catch (error) {
                alert("Error al conectar con el servidor");
            }
        };
        async function cargarTabla() {
            const tabla = document.getElementById('selTabla').value;
            try {
                const res = await fetch(`/api/data/${tabla}`);
                const datos = await res.json();
                
                const head = document.getElementById('headTab');
                const body = document.getElementById('bodyTab');
                
                if (datos.length > 0) {
                    const columnas = Object.keys(datos[0]);
                    head.innerHTML = `<tr>${columnas.map(c => `<th>${c}</th>`).join('')} <th class="text-end">Acciones</th></tr>`;
                    
                    body.innerHTML = datos.map(fila => {
                        const idCol = columnas[0]; 
                        const idVal = fila[idCol];
                        
                        let botonConfirmar = "";
                        if(tabla === 'pagos' && fila.estado_pago !== 'pagado') {
                            botonConfirmar = `<button class="btn btn-sm btn-success me-1" onclick="confirmarPagoDirecto('${idCol}','${idVal}')" title="Confirmar Pago">✅</button>`;
                        }

                        return `
                            <tr>
                                ${columnas.map(c => `<td>${fila[c] === null ? '<span class="text-muted">---</span>' : fila[c]}</td>`).join('')}
                                <td class="text-end">
                                    ${botonConfirmar}
                                    <button class="btn btn-sm btn-info text-white" onclick="editar('${tabla}','${idCol}','${idVal}')">✏️</button>
                                    <button class="btn btn-sm btn-danger" onclick="borrar('${tabla}','${idCol}','${idVal}')">🗑️</button>
                                </td>
                            </tr>`;
                    }).join('');
                } else {
                    body.innerHTML = "<tr><td colspan='10' class='text-center py-5 text-muted'>No hay registros</td></tr>";
                }
            } catch (error) {
                console.error("Error al cargar tabla:", error);
            }
        }
        async function confirmarPagoDirecto(idCol, idVal) {
            if (!confirm("¿Marcar como PAGADO? Esto registrará la fecha y hora actual.")) return;
            const res = await fetch(`/api/data/pagos/${idCol}/${idVal}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ campo: 'estado_pago', valor: 'pagado' })
            });
            if (res.ok) cargarTabla();
            else alert("Error al confirmar pago");
        }

        async function borrar(tabla, col, val) {
            if (confirm(`¿Seguro que deseas eliminar este registro?`)) {
                const res = await fetch(`/api/data/${tabla}/${col}/${val}`, { method: 'DELETE' });
                if (res.ok) cargarTabla();
            }
        }

        async function editar(tabla, idCol, idVal) {
            const campo = prompt("¿Qué columna quieres editar?");
            if (!campo) return;
            const valor = prompt("Ingresa el nuevo valor:");
            if (valor === null) return;

            const res = await fetch(`/api/data/${tabla}/${idCol}/${idVal}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ campo, valor })
            });
            if (res.ok) cargarTabla();
            else alert("Error al editar");
        }
    </script>
</body>
</html>
